<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英文學習日誌</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:      #0a0a0f;
  --s1:      #13131a;
  --s2:      #1a1a24;
  --s3:      #0f0f18;
  --cyan:    #00e5ff;
  --purple:  #7b61ff;
  --red:     #ff6b6b;
  --gold:    #ffd166;
  --green:   #00c896;
  --text:    #e8e8f0;
  --text2:   #a8a8c0;
  --muted:   #6b6b85;
  --dim:     #2a2a3a;
  --border:  rgba(255,255,255,0.07);
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,229,255,0.022) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.022) 1px, transparent 1px);
  background-size: 56px 56px;
  pointer-events: none;
  z-index: 0;
}

#app { position: relative; z-index: 1; min-height: 100vh; }

/* ─── Shared ─── */
.wrap { max-width: 880px; margin: 0 auto; padding: 0 20px; }

.tag {
  display: inline-block;
  font-family: 'Syne', sans-serif;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--cyan);
  border: 1px solid rgba(0,229,255,0.28);
  padding: 3px 10px; border-radius: 2px;
}

btn, button { cursor: pointer; font-family: inherit; border: none; outline: none; }

/* ─── CALENDAR VIEW ─── */
.cal-hero {
  padding: 52px 20px 36px;
  max-width: 880px; margin: 0 auto;
}

.cal-h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(30px, 5.5vw, 48px);
  font-weight: 800; line-height: 1.1;
  margin: 14px 0 8px;
  background: linear-gradient(130deg, #fff 0%, var(--cyan) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

.cal-sub { color: var(--muted); font-size: 13px; }

.cal-nav-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 20px;
  max-width: 880px; margin: 0 auto;
}

.month-title {
  font-family: 'Syne', sans-serif;
  font-size: 20px; font-weight: 700;
  color: var(--text); letter-spacing: 0.02em;
}

.arr-btn {
  width: 38px; height: 38px;
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 9px; color: var(--muted);
  font-size: 15px; display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.arr-btn:hover { border-color: rgba(0,229,255,.3); color: var(--cyan); }

.cal-wrap { max-width: 880px; margin: 0 auto; padding: 0 20px 64px; }

.weekrow {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 4px; margin-bottom: 6px;
}

.wday {
  text-align: center;
  font-family: 'Syne', sans-serif;
  font-size: 11px; font-weight: 600;
  letter-spacing: .1em; color: var(--muted);
  padding: 6px 0;
}

.daygrid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}

.dcell {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px;
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 10px; cursor: pointer;
  transition: all .15s; position: relative;
  min-height: 76px; padding: 8px 5px;
}
.dcell:hover { border-color: rgba(0,229,255,.22); background: var(--s2); }

.dcell.is-today { border-color: rgba(0,229,255,.45); background: rgba(0,229,255,.05); }

.dcell.other { opacity: .2; pointer-events: none; }

.dcell.has-dot .dot { display: block; }

.dnum {
  font-family: 'Syne', sans-serif;
  font-size: 14px; font-weight: 600;
  color: var(--text); line-height: 1;
}
.dcell.is-today .dnum { color: var(--cyan); }

.dot {
  display: none;
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 7px var(--cyan);
}

.dcell-topic {
  font-size: 10px; color: var(--muted);
  text-align: center; line-height: 1.3;
  overflow: hidden; text-overflow: ellipsis;
  display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2;
  -webkit-box-orient: vertical;
  width: 100%; padding: 0 3px;
  word-break: break-all;
}

.cal-footer {
  max-width: 880px; margin: 0 auto;
  padding: 0 20px 20px;
  display: flex; gap: 10px; flex-wrap: wrap;
}

.stat-chip {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 14px;
  font-family: 'Syne', sans-serif;
  font-size: 11px; color: var(--muted);
}
.stat-chip b { color: var(--cyan); }

.backup-row {
  max-width: 880px; margin: 0 auto;
  padding: 0 20px 48px;
  display: flex; gap: 10px; flex-wrap: wrap;
  border-top: 1px solid var(--border);
  padding-top: 16px; margin-top: 4px;
}

.bk-btn {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 8px; padding: 9px 16px;
  font-family: 'Syne', sans-serif;
  font-size: 11px; font-weight: 600; letter-spacing: .1em;
  color: var(--muted); transition: all .15s;
  display: flex; align-items: center; gap: 7px;
}
.bk-btn:hover { border-color: rgba(0,229,255,.25); color: var(--cyan); }
.bk-btn.imp:hover { border-color: rgba(0,200,150,.25); color: var(--green); }

/* ─── DAY VIEW ─── */
.day-topbar {
  position: sticky; top: 0; z-index: 80;
  background: rgba(10,10,15,.88);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  padding: 13px 20px;
}

.day-topbar-inner {
  max-width: 880px; margin: 0 auto;
  display: flex; align-items: center; gap: 14px;
}

.back-btn {
  background: var(--s2); border: 1px solid var(--border);
  color: var(--muted); border-radius: 8px;
  padding: 7px 13px;
  font-family: 'Syne', sans-serif;
  font-size: 11px; font-weight: 600; letter-spacing: .1em;
  transition: all .15s; flex-shrink: 0;
}
.back-btn:hover { border-color: rgba(0,229,255,.3); color: var(--cyan); }

.day-date-label {
  font-family: 'Syne', sans-serif;
  font-size: 14px; font-weight: 700;
  flex: 1; letter-spacing: .02em;
}

.save-btn {
  background: rgba(0,229,255,.1); border: 1px solid rgba(0,229,255,.28);
  color: var(--cyan); border-radius: 8px;
  padding: 7px 16px;
  font-family: 'Syne', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: .1em;
  transition: all .15s; flex-shrink: 0;
}
.save-btn:hover { background: rgba(0,229,255,.18); }

.day-body {
  max-width: 880px; margin: 0 auto;
  padding: 24px 20px 80px;
  display: flex; flex-direction: column; gap: 14px;
}

/* ─── SECTION CARDS ─── */
.card {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
  transition: border-color .2s;
}
.card:focus-within { border-color: rgba(0,229,255,.12); }

#yt-sticky-player {
  z-index: 40;
  transition: box-shadow .3s;
}
#yt-sticky-player.playing {
  position: sticky;
  top: 62px;
  box-shadow: 0 8px 36px rgba(0,0,0,.7);
}
#yt-sticky-player.playing .yt-frame {
  aspect-ratio: unset;
  height: 33vh;
  width: calc(33vh * 16 / 9);
  max-width: 100%;
  margin: 0 auto;
  border-radius: 10px;
}
#yt-sticky-player.playing .yt-empty { display: none; }

.card-head {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--s2);
}

.sec-badge {
  font-family: 'Syne', sans-serif;
  font-size: 10px; font-weight: 700; letter-spacing: .15em;
  padding: 3px 8px; border-radius: 4px;
}
.b-red    { background: rgba(255,107,107,.12); color: var(--red); }
.b-purple { background: rgba(123, 97,255,.12); color: var(--purple); }
.b-cyan   { background: rgba(  0,229,255,.12); color: var(--cyan); }

.card-title {
  font-family: 'Syne', sans-serif;
  font-size: 14px; font-weight: 700;
  flex: 1;
}

.card-hint { font-size: 11px; color: var(--muted); }

.card-body { padding: 20px; }

/* ─── YOUTUBE ─── */
.yt-row { display: flex; gap: 10px; margin-bottom: 14px; }

.yt-field {
  flex: 1;
  background: var(--s3); border: 1px solid var(--dim);
  border-radius: 8px; padding: 10px 14px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 13px; color: var(--text); font-weight: 300;
  outline: none; transition: border-color .15s;
}
.yt-field:focus { border-color: rgba(255,107,107,.4); }
.yt-field::placeholder { color: var(--dim); }

.yt-go {
  background: rgba(255,107,107,.1); border: 1px solid rgba(255,107,107,.25);
  color: var(--red); border-radius: 8px;
  padding: 10px 16px;
  font-family: 'Syne', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: .08em;
  white-space: nowrap; transition: all .15s;
}
.yt-go:hover { background: rgba(255,107,107,.18); }

.yt-title {
  font-size: 12px; color: var(--text2); font-weight: 400;
  line-height: 1.5; margin-top: 2px; margin-bottom: 4px;
  padding-left: 2px;
}

.yt-frame {
  width: 100%; aspect-ratio: 16/9;
  border-radius: 12px; overflow: hidden; background: #000;
  position: relative;
}
.yt-frame iframe {
  position: absolute; inset: 0;
  width: 100%; height: 100%; border: none;
}

.yt-empty {
  width: 100%; aspect-ratio: 16/9;
  border-radius: 12px; background: var(--s2);
  border: 1px dashed var(--dim);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; color: var(--muted); font-size: 13px;
}
.yt-empty-icon { font-size: 36px; opacity: .35; }

.yt-thumb {
  width: 100%; aspect-ratio: 16/9;
  border-radius: 12px; overflow: hidden;
  position: relative; cursor: pointer;
  background: #000;
}
.yt-thumb img {
  width: 100%; height: 100%; object-fit: cover;
  display: block; opacity: .85;
  transition: opacity .2s;
}
.yt-thumb:hover img { opacity: 1; }
.yt-thumb-overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px;
  background: rgba(0,0,0,.35);
  transition: background .2s;
}
.yt-thumb:hover .yt-thumb-overlay { background: rgba(0,0,0,.2); }
.yt-thumb-icon {
  width: 56px; height: 56px; border-radius: 50%;
  background: rgba(255,255,255,.15);
  backdrop-filter: blur(4px);
  border: 1.5px solid rgba(255,255,255,.3);
  display: flex; align-items: center; justify-content: center;
}
.yt-thumb-notice {
  font-size: 12px; color: rgba(255,255,255,.75);
  letter-spacing: .02em; text-align: center; padding: 0 20px;
}

/* ─── LISTEN ─── */
.checks { display: flex; flex-direction: column; gap: 9px; margin-bottom: 16px; }

.chk-row {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 13px 15px;
  background: var(--s2); border: 1px solid var(--border);
  border-radius: 10px; cursor: pointer;
  transition: all .15s; user-select: none;
}
.chk-row.done {
  border-color: rgba(123,97,255,.32);
  background: rgba(123,97,255,.06);
}

.chkbox {
  width: 20px; height: 20px; flex-shrink: 0; margin-top: 2px;
  border: 1.5px solid var(--dim); border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  background: var(--s3); transition: all .15s;
}
.chk-row.done .chkbox {
  background: var(--purple); border-color: var(--purple);
  box-shadow: 0 0 9px rgba(123,97,255,.45);
}
.chk-row.done .chkbox::after {
  content: '✓'; font-size: 12px; font-weight: 700; color: #fff;
}

.chk-label {
  font-family: 'Syne', sans-serif;
  font-size: 12px; font-weight: 700; margin-bottom: 2px;
}

.chk-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }

.fl { display: block; margin-bottom: 6px;
  font-family: 'Syne', sans-serif;
  font-size: 10px; font-weight: 600; letter-spacing: .14em;
  text-transform: uppercase; color: var(--muted);
}

input[type=text], textarea {
  width: 100%; background: var(--s3);
  border: 1px solid var(--dim); border-radius: 8px;
  padding: 10px 14px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 13px; color: var(--text); font-weight: 300;
  outline: none; resize: none;
  transition: border-color .15s, box-shadow .15s;
}
input[type=text]:focus, textarea:focus {
  border-color: rgba(0,229,255,.35);
  box-shadow: 0 0 0 3px rgba(0,229,255,.05);
}
input::placeholder, textarea::placeholder { color: var(--dim); }

/* ─── CONTENT / PARSE ─── */
.parse-actions { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }

.parse-go {
  background: linear-gradient(135deg,rgba(0,229,255,.14),rgba(123,97,255,.14));
  border: 1px solid rgba(0,229,255,.28); color: var(--cyan);
  border-radius: 8px; padding: 9px 18px;
  font-family: 'Syne', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: .1em;
  transition: all .15s;
}
.parse-go:hover { background: linear-gradient(135deg,rgba(0,229,255,.22),rgba(123,97,255,.22)); }

.prompt-copy {
  background: var(--s2); border: 1px solid var(--border);
  color: var(--muted); border-radius: 8px; padding: 9px 16px;
  font-family: 'Syne', sans-serif;
  font-size: 11px; font-weight: 600; letter-spacing: .08em;
  transition: all .15s;
}
.prompt-copy:hover { border-color: rgba(0,229,255,.2); color: var(--text); }

.parse-err {
  display: none;
  background: rgba(255,107,107,.1); border: 1px solid rgba(255,107,107,.2);
  border-radius: 8px; padding: 10px 14px;
  font-size: 12px; color: var(--red); margin-top: 10px;
}

/* ─── RESULT CARDS ─── */
.results { display: flex; flex-direction: column; gap: 24px; margin-top: 20px; }

.group-label {
  font-family: 'Syne', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: .18em;
  text-transform: uppercase; margin-bottom: 12px;
  display: flex; align-items: center; gap: 10px;
}
.group-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.gl-cyan   { color: var(--cyan); }
.gl-purple { color: var(--purple); }

/* Phrase cards */
.phrase-grid { display: flex; flex-direction: column; gap: 10px; }

.pc {
  background: var(--s2); border: 1px solid var(--border);
  border-left: 3px solid var(--cyan);
  border-radius: 10px; padding: 16px 18px;
}
.pc-en {
  font-family: 'Syne', sans-serif;
  font-size: 15px; font-weight: 700; color: var(--cyan);
  margin-bottom: 3px; line-height: 1.4;
}
.pc-zh { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
.pc-ex {
  font-size: 13px; color: var(--text2);
  background: rgba(0,229,255,.04);
  border-left: 2px solid rgba(0,229,255,.2);
  border-radius: 0 6px 6px 0;
  padding: 9px 12px; line-height: 1.75;
}

/* Word cards */
.word-grid {
  display: flex; flex-direction: column; gap: 10px;
}

.wc {
  background: var(--s2); border: 1px solid var(--border);
  border-left: 3px solid var(--purple);
  border-radius: 10px; padding: 14px 16px;
}
.wc-top { display: flex; align-items: baseline; gap: 8px; margin-bottom: 3px; }
.wc-word {
  font-family: 'Syne', sans-serif;
  font-size: 17px; font-weight: 700; color: var(--purple);
}
.wc-ph { font-size: 12px; color: var(--muted); }
.wc-zh { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
.wc-ex {
  font-size: 13px; color: var(--text2);
  background: rgba(123,97,255,.05);
  border-left: 2px solid rgba(123,97,255,.2);
  border-radius: 0 6px 6px 0;
  padding: 9px 12px; line-height: 1.75;
}

.ex-zh {
  font-size: 11px; color: var(--muted);
  margin-top: 5px; padding-left: 2px;
  line-height: 1.5;
}

/* ─── SPEAK BUTTONS ─── */
.speak-grp { display: flex; gap: 5px; margin: 7px 0 10px; }

.speak-btn {
  background: rgba(0,229,255,.07);
  border: 1px solid rgba(0,229,255,.22);
  border-radius: 5px; padding: 3px 9px;
  font-family: 'Syne', sans-serif;
  font-size: 10px; font-weight: 700; letter-spacing: .05em;
  color: var(--cyan); cursor: pointer; transition: all .15s;
}
.speak-btn:hover { background: rgba(0,229,255,.18); }
.speak-btn.uk {
  color: var(--purple);
  border-color: rgba(123,97,255,.25);
  background: rgba(123,97,255,.07);
}
.speak-btn.uk:hover { background: rgba(123,97,255,.18); }
.speak-btn.sm { font-size: 9px; padding: 2px 7px; }

.ex-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.ex-row .ex-text { flex: 1; }
.ex-row .ex-btns { display: flex; gap: 4px; flex-shrink: 0; margin-top: 1px; }

/* ─── PLAY ALL BAR ─── */
.play-all-bar {
  display: flex; align-items: center; gap: 12px;
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 18px;
}

.play-lang-toggle {
  display: flex; gap: 3px;
  background: var(--s2); border-radius: 7px; padding: 3px;
  flex-shrink: 0;
}

.play-lang-btn {
  background: none; border: none; border-radius: 5px;
  padding: 5px 12px;
  font-family: 'Syne', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: .05em;
  color: var(--muted); cursor: pointer; transition: all .15s;
}
.play-lang-btn.active { background: var(--s1); color: var(--cyan); }

.play-all-btn {
  flex: 1;
  background: linear-gradient(135deg, rgba(0,229,255,.09), rgba(123,97,255,.09));
  border: 1px solid rgba(0,229,255,.22);
  color: var(--cyan); border-radius: 9px;
  padding: 10px 16px;
  font-family: 'Syne', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: .1em;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all .15s;
}
.play-all-btn:hover {
  background: linear-gradient(135deg, rgba(0,229,255,.17), rgba(123,97,255,.17));
}
.play-all-btn.playing {
  color: var(--red); border-color: rgba(255,107,107,.28);
  background: rgba(255,107,107,.07);
}

/* ─── PREPOSITION CARDS ─── */
.gl-gold { color: var(--gold); }
.prep-grid { display: flex; flex-direction: column; gap: 10px; }

.prpc {
  background: var(--s2); border: 1px solid var(--border);
  border-left: 3px solid var(--gold);
  border-radius: 10px; padding: 14px 16px;
}
.prpc-phrase {
  font-family: 'Syne', sans-serif;
  font-size: 14px; font-weight: 700; color: var(--gold);
  margin-bottom: 3px;
}
.prpc-zh { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
.prpc-ex {
  font-size: 13px; color: var(--text2);
  background: rgba(255,209,102,.05);
  border-left: 2px solid rgba(255,209,102,.22);
  border-radius: 0 6px 6px 0;
  padding: 9px 12px; line-height: 1.75;
}

/* ─── TOAST ─── */
#toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(14px);
  background: var(--s2); border: 1px solid rgba(0,229,255,.22);
  color: var(--cyan); padding: 10px 22px;
  border-radius: 8px; font-family: 'Syne', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: .12em;
  opacity: 0; transition: all .25s;
  pointer-events: none; z-index: 300; white-space: nowrap;
  box-shadow: 0 4px 24px rgba(0,0,0,.45);
}
#toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ─── RESPONSIVE ─── */
@media (max-width: 480px) {
  .yt-row { flex-direction: column; }
  .dcell  { min-height: 56px; border-radius: 8px; padding: 6px 3px; }
  .dnum   { font-size: 12px; }
  .day-date-label { font-size: 12px; }
  .card-body { padding: 16px; }
  .card-hint { display: none; }
  .pc-en { font-size: 14px; }
  .wc-word { font-size: 15px; }
}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>

<script>
/* ════════════════════════════════════
   Storage
════════════════════════════════════ */
const KEY = 'eng_v3';

function db()           { try { return JSON.parse(localStorage.getItem(KEY)||'{}'); } catch { return {}; } }
function dbWrite(d)     { localStorage.setItem(KEY, JSON.stringify(d)); }
function dayRead(k)     { return db()[k] || {}; }
function dayWrite(k, p) { const a=db(); a[k]={...(a[k]||{}), ...p}; dbWrite(a); }
function hasEntry(k)    { const e=db()[k]; return !!(e&&(e.ytUrl||e.note||e.parsed)); }

/* ════════════════════════════════════
   Helpers
════════════════════════════════════ */
let navYear  = new Date().getFullYear();
let navMonth = new Date().getMonth();

const today = () => new Date().toISOString().split('T')[0];

function fmtDate(s) {
  const d = new Date(s+'T00:00:00');
  const wd = ['日','一','二','三','四','五','六'];
  const m  = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${d.getFullYear()} / ${m} / ${dd} — 週${wd[d.getDay()]}`;
}

function ytId(url='') {
  const m = url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

function esc(s='') {
  return String(s)
    .replace(/&/g,'&amp;').replace(/"/g,'&quot;')
    .replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let _tid; // toast timer
function toast(msg, dur=2000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  clearTimeout(_tid); _tid = setTimeout(()=>t.classList.remove('on'), dur);
}

/* ════════════════════════════════════
   Auto-save (debounced)
════════════════════════════════════ */
let _saveTid;
function schedSave(dateStr) {
  clearTimeout(_saveTid);
  _saveTid = setTimeout(() => flushSave(dateStr), 700);
}

function flushSave(dateStr) {
  const ytUrl    = document.getElementById('yt-url')?.value   || '';
  const note     = document.getElementById('listen-note')?.value || '';
  const rawInput = document.getElementById('raw-input')?.value  || '';
  const checks   = {
    c1: document.getElementById('c1')?.classList.contains('done'),
    c2: document.getElementById('c2')?.classList.contains('done'),
    c3: document.getElementById('c3')?.classList.contains('done'),
  };
  dayWrite(dateStr, { ytUrl, note, rawInput, checks });
}

function manualSave(dateStr) {
  flushSave(dateStr);
  toast('✓ 儲存完成');
}

/* ════════════════════════════════════
   CALENDAR VIEW
════════════════════════════════════ */
function showCalendar() {
  history.pushState({}, '', '#');
  const t   = today();
  const all = db();
  const first = new Date(navYear, navMonth, 1);
  const last  = new Date(navYear, navMonth+1, 0);
  const dow   = first.getDay();
  const total = last.getDate();

  const monthStr = first.toLocaleDateString('zh-TW', { year:'numeric', month:'long' });

  // completion stats
  const thisMonthDone = Object.keys(all).filter(k => {
    const [y,m] = k.split('-').map(Number);
    return y===navYear && m===navMonth+1;
  }).length;

  // build cells
  let cells = '';

  // prev-month padding
  for (let i=0; i<dow; i++) {
    const pd = new Date(navYear, navMonth, i-dow+1);
    cells += `<div class="dcell other"><span class="dnum">${pd.getDate()}</span><span class="dot"></span></div>`;
  }

  // current month
  for (let d=1; d<=total; d++) {
    const ds  = `${navYear}-${String(navMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cls = ['dcell', ds===t?'is-today':'', hasEntry(ds)?'has-dot':''].filter(Boolean).join(' ');
    const topic = all[ds]?.ytTitle || '';
    cells += `<div class="${cls}" onclick="showDay('${ds}')">
      <span class="dnum">${d}</span>
      <span class="dot"></span>
      ${topic ? `<span class="dcell-topic">${esc(topic)}</span>` : ''}
    </div>`;
  }

  // next-month padding (fill to 42)
  const pad = 42 - dow - total;
  for (let d=1; d<=pad; d++) {
    cells += `<div class="dcell other"><span class="dnum">${d}</span><span class="dot"></span></div>`;
  }

  document.getElementById('app').innerHTML = `
    <div class="cal-hero">
      <div class="tag">Daily Journal</div>
      <h1 class="cal-h1">英文學習日誌</h1>
      <p class="cal-sub">每天記一頁，聽說讀寫全方位累積</p>
    </div>

    <div class="cal-nav-bar">
      <button class="arr-btn" onclick="mv(-1)">←</button>
      <span class="month-title">${monthStr}</span>
      <button class="arr-btn" onclick="mv(1)">→</button>
    </div>

    <div class="cal-wrap">
      <div class="weekrow">
        ${['日','一','二','三','四','五','六'].map(w=>`<div class="wday">${w}</div>`).join('')}
      </div>
      <div class="daygrid">${cells}</div>
    </div>

    <div class="cal-footer">
      <div class="stat-chip">本月完成 <b>${thisMonthDone}</b> 天</div>
      <div class="stat-chip">累計 <b>${Object.keys(all).length}</b> 天</div>
    </div>
    <div class="backup-row">
      <button class="bk-btn" onclick="exportData()">⬇ 匯出備份</button>
      <button class="bk-btn imp" onclick="document.getElementById('imp-file').click()">⬆ 匯入還原</button>
      <input id="imp-file" type="file" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  `;
}

function mv(delta) {
  navMonth += delta;
  if (navMonth > 11) { navMonth=0; navYear++; }
  if (navMonth < 0)  { navMonth=11; navYear--; }
  showCalendar();
}

/* ─── YouTube loader ─── */
let _curYtId  = '';
let _curYtUrl = '';

async function loadVid(dateStr) {
  const url = document.getElementById('yt-url').value.trim();
  const id  = ytId(url);
  _curYtId  = id || '';
  _curYtUrl = url;
  document.getElementById('yt-box').innerHTML = id
    ? `<div class="yt-frame"><iframe src="https://www.youtube.com/embed/${id}?enablejsapi=1"
        allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"
        allowfullscreen></iframe></div>`
    : `<div class="yt-empty"><div class="yt-empty-icon">▶</div><div>無法辨識連結，請確認 YouTube URL</div></div>`;
  schedSave(dateStr);

  if (id) {
    const title = await fetchYtTitle(url);
    if (title) {
      dayWrite(dateStr, { ytTitle: title });
      const el = document.getElementById('yt-title');
      if (el) { el.textContent = title; el.style.display = ''; }
    }
  }
}

async function fetchYtTitle(url) {
  try {
    const res = await fetch(
      `https://www.youtube.com/oembed?url=${encodeURIComponent(url)}&format=json`
    );
    if (!res.ok) return null;
    const data = await res.json();
    return data.title || null;
  } catch {
    return null;
  }
}

/* ─── Check toggle ─── */
function toggleChk(id, dateStr) {
  document.getElementById(id).classList.toggle('done');

/* ─── Parse & render ─── */
function doParse(dateStr) {
  const raw  = document.getElementById('raw-input').value.trim();
  const errEl = document.getElementById('perr');
  errEl.style.display = 'none';
  if (!raw) return;

  let json;
  try { json = JSON.parse(raw); }
  catch { errEl.style.display = 'block'; return; }

  const parsed = {
    phrases:     (json.phrases||[]).filter(p=>p&&p.en),
    words:       (json.words||json.vocabulary||[]).filter(w=>w&&w.word),
    prepositions:(json.prepositions||[]).filter(p=>p&&p.phrase),
  };

  const all = db();
  all[dateStr] = { ...(all[dateStr]||{}), parsed, rawInput: raw };
  dbWrite(all);

  document.getElementById('cards-out').innerHTML = buildCards(parsed);
  toast('✓ 解析完成');
}

function spk(btn) {
  if (!window.speechSynthesis) { toast('⚠ 瀏覽器不支援語音'); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(btn.dataset.text);
  u.lang = btn.dataset.lang;
  u.rate = 0.88;
  window.speechSynthesis.speak(u);
}

const SPK_ICON  = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>`;
const PLAY_ICON = `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="vertical-align:-1px"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
const STOP_ICON = `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="vertical-align:-1px"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>`;

function speakBtns(text) {
  const t = esc(text);
  return `<div class="speak-grp">
    <button class="speak-btn" data-text="${t}" data-lang="en-US" onclick="spk(this)">${SPK_ICON} US</button>
    <button class="speak-btn uk" data-text="${t}" data-lang="en-GB" onclick="spk(this)">${SPK_ICON} UK</button>
  </div>`;
}

function exRow(text, colorClass, zhText='') {
  const t = esc(text);
  return `<div class="ex-row">
    <div class="ex-text">
      <div class="${colorClass}">${t}</div>
      ${zhText ? `<div class="ex-zh">${esc(zhText)}</div>` : ''}
    </div>
    <div class="ex-btns">
      <button class="speak-btn sm" data-text="${t}" data-lang="en-US" onclick="spk(this)">${SPK_ICON} US</button>
      <button class="speak-btn sm uk" data-text="${t}" data-lang="en-GB" onclick="spk(this)">${SPK_ICON} UK</button>
    </div>
  </div>`;
}

function buildCards(c) {
  const phrases = c.phrases||[];
  const words   = c.words||[];
  const preps   = c.prepositions||[];
  if (!phrases.length && !words.length && !preps.length) return '';

  let h = '<div class="results">';

  if (phrases.length) {
    h += `<div>
      <div class="group-label gl-cyan">句型 Phrases</div>
      <div class="phrase-grid">
        ${phrases.map(p=>`
          <div class="pc">
            <div class="pc-en">${esc(p.en)}</div>
            <div class="pc-zh">${esc(p.zh||'')}</div>
            ${speakBtns(p.en)}
            ${p.example ? exRow(p.example,'pc-ex',p.example_zh||'') : ''}
          </div>`).join('')}
      </div>
    </div>`;
  }

  if (words.length) {
    h += `<div>
      <div class="group-label gl-purple">單字 Vocabulary</div>
      <div class="word-grid">
        ${words.map(w=>`
          <div class="wc">
            <div class="wc-top">
              <span class="wc-word">${esc(w.word)}</span>
              ${w.phonetic?`<span class="wc-ph">${esc(w.phonetic)}</span>`:''}
            </div>
            <div class="wc-zh">${esc(w.zh||'')}</div>
            ${speakBtns(w.word)}
            ${w.example ? exRow(w.example,'wc-ex',w.example_zh||'') : ''}
          </div>`).join('')}
      </div>
    </div>`;
  }

  if (preps.length) {
    h += `<div>
      <div class="group-label gl-gold">介系詞用法 Prepositions</div>
      <div class="prep-grid">
        ${preps.map(p=>`
          <div class="prpc">
            <div class="prpc-phrase">${esc(p.phrase)}</div>
            <div class="prpc-zh">${esc(p.zh||'')}</div>
            ${speakBtns(p.phrase)}
            ${p.example ? exRow(p.example,'prpc-ex',p.example_zh||'') : ''}
          </div>`).join('')}
      </div>
    </div>`;
  }

  return h + '</div>';
}

/* ─── AI prompt template ─── */
const PROMPT = `請分析以下 YouTube 影片的英文學習重點，輸出純 JSON（不含任何說明文字、不含 markdown 代碼塊）：

{

  "prepositions": [
    { "phrase": "介系詞片語", "zh": "中文意思", "example": "例句", "example_zh": "例句中文翻譯" }
  ]
}

請抓出：
- phrases：4–8 個值得學習的片語、句型或慣用語
- words：5–10 個重要單字（含 IPA 音標）
- prepositions：影片中出現的介系詞用法（如有則列出，沒有則給空陣列 []）

例句方向：優先使用影片中出現的原句或近似句，若影片無適合句子，再從以下情境擇 1–2 個自行生成：

請直接開啟上方 YouTube 連結，取得影片字幕或逐字稿後進行分析。若無法存取字幕，請根據影片標題與主題自行推測內容，生成符合該主題的句型、單字與例句，不需告知無法存取。`;

function copyPrompt() {
  const ytUrl = document.getElementById('yt-url')?.value.trim() || '';
  const ytLine = ytUrl ? `YouTube 連結：${ytUrl}\n\n` : '';
  const text = ytLine + PROMPT;
  navigator.clipboard?.writeText(text)
    .then(()=>toast('✓ 提示詞已複製'))
    .catch(()=>{
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      toast('✓ 提示詞已複製');
    });
}

/* ════════════════════════════════════
   Backup — Export / Import
════════════════════════════════════ */
function exportData() {
  const data = db();
  if (!Object.keys(data).length) { toast('⚠ 目前沒有資料可以備份'); return; }

  const filename = `english-journal-${today()}.json`;
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('✓ 備份已下載');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const incoming = JSON.parse(ev.target.result);
      // validate: must be an object with date-string keys
      const isValid = typeof incoming === 'object' && !Array.isArray(incoming) &&
        Object.keys(incoming).every(k => /^\d{4}-\d{2}-\d{2}$/.test(k));
      if (!isValid) throw new Error('格式不符');

      // merge with existing (new data wins on conflict)
      const merged = { ...db(), ...incoming };
      dbWrite(merged);
      toast(`✓ 已還原 ${Object.keys(incoming).length} 筆紀錄`);
      showCalendar();
    } catch {
      toast('⚠ 檔案格式錯誤，請選擇正確的備份檔');
    }
    e.target.value = ''; // reset so same file can be re-imported
  };
  reader.readAsText(file);
}

let playLang = 'en-US';

function setPlayLang(lang) {
  playLang = lang;
  document.getElementById('lang-us')?.classList.toggle('active', lang === 'en-US');
  document.getElementById('lang-uk')?.classList.toggle('active', lang === 'en-GB');

function togglePlayAll() {
  if (_isPlaying) {
    window.speechSynthesis.cancel();
    setPlayState(false);
  } else {
    startPlayAll();
  }
}

function startPlayAll() {
  if (!window.speechSynthesis) { toast('⚠ 瀏覽器不支援語音'); return; }
  // collect all example texts from ex-row speak buttons
  const btns = document.querySelectorAll(`.ex-btns .speak-btn[data-lang="${playLang}"]`);
  _playQueue = Array.from(btns).map(b => b.dataset.text).filter(Boolean);
  if (!_playQueue.length) { toast('⚠ 沒有例句，請先解析 AI 內容'); return; }
  _playIdx = 0;
  window.speechSynthesis.cancel();
  setPlayState(true);
  playNext();
}

function playNext() {
  if (_playIdx >= _playQueue.length) { setPlayState(false); return; }
  const u  = new SpeechSynthesisUtterance(_playQueue[_playIdx++]);
  u.lang   = playLang;
  u.rate   = 0.85;
  u.onend  = () => setTimeout(playNext, 650);
  u.onerror = () => playNext();
  window.speechSynthesis.speak(u);
}

function setPlayState(playing) {
  _isPlaying = playing;
  const btn = document.getElementById('play-all-btn');
  if (!btn) return;
  btn.classList.toggle('playing', playing);
  btn.innerHTML = playing
    ? `${STOP_ICON} 停止`
    : `${PLAY_ICON} 播放所有例句`;
}

/* ─── YouTube play-state & error detection ─── */
window.addEventListener('message', function(e) {
  if (e.origin !== 'https://www.youtube.com') return;
  try {
    const data = JSON.parse(e.data);

    // Embedding blocked (error 100/101/150/151)
    if (data.event === 'infoDelivery' && data.info?.error) {
      showYtFallback(_curYtId, _curYtUrl);
      return;
    }

    // Play state
    if (data.event === 'infoDelivery' && data.info && 'playerState' in data.info) {
      const player = document.getElementById('yt-sticky-player');
      if (!player) return;
      const isPlaying = data.info.playerState === 1 || data.info.playerState === 3;
      player.classList.toggle('playing', isPlaying);
    }
  } catch {}
});

function showYtFallback(id, url) {
  const box = document.getElementById('yt-box');
  if (!box || !id) return;
  const thumb = `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
  box.innerHTML = `
    <div class="yt-thumb" onclick="window.open('${esc(url)}','_blank')">
      <img src="${thumb}" alt="thumbnail">
      <div class="yt-thumb-overlay">
        <div class="yt-thumb-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="white" stroke="none">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
        </div>
        <div class="yt-thumb-notice">此影片不支援嵌入，點擊在 YouTube 開啟</div>
      </div>
    </div>`;
  document.getElementById('yt-sticky-player')?.classList.remove('playing');
}

/* ─── Init ─── */
route();
</script>
